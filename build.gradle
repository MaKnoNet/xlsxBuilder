plugins {
    id 'java'
    id 'application'
}

group = 'com.xlsbuilder'
version = '1.0.0'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

// UTF-8 für die Kompilierung erzwingen: die Quellen enthalten Umlaute (ä/ö/ü) in Kommentaren und
// String-Literalen; ohne diese Festlegung verwendet javac/Eclipse unter Windows Cp1252 und zerstört sie.
tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}
tasks.withType(Javadoc).configureEach {
    options.encoding = 'UTF-8'
}

repositories {
    mavenCentral()
}

// JUnit-Version zentral.
def junitVersion = '5.14.0'
def junitPlatformVersion = '1.14.0'

// Offline-Fallback: Auf dieser Maschine liegt JUnit zwar als JARs im Gradle-Modul-Cache, aber ohne
// die Metadaten, die Gradle für die Offline-Auflösung normaler Koordinaten braucht. Daher werden im
// Offline-Modus (--offline) die JARs direkt als Datei-Deps eingebunden (hash-unabhängig über den
// Cache-Pfad). Online wird ganz normal über mavenCentral aufgelöst.
def junitCacheJars = fileTree(
        dir: "${System.getProperty('user.home')}/.gradle/caches/modules-2/files-2.1",
        includes: [
                "org.junit.jupiter/junit-jupiter/${junitVersion}/**/junit-jupiter-${junitVersion}.jar",
                "org.junit.jupiter/junit-jupiter-api/${junitVersion}/**/junit-jupiter-api-${junitVersion}.jar",
                "org.junit.jupiter/junit-jupiter-params/${junitVersion}/**/junit-jupiter-params-${junitVersion}.jar",
                "org.junit.jupiter/junit-jupiter-engine/${junitVersion}/**/junit-jupiter-engine-${junitVersion}.jar",
                "org.junit.platform/junit-platform-commons/${junitPlatformVersion}/**/junit-platform-commons-${junitPlatformVersion}.jar",
                "org.junit.platform/junit-platform-engine/${junitPlatformVersion}/**/junit-platform-engine-${junitPlatformVersion}.jar",
                "org.junit.platform/junit-platform-launcher/${junitPlatformVersion}/**/junit-platform-launcher-${junitPlatformVersion}.jar",
                "org.opentest4j/opentest4j/1.3.0/**/opentest4j-1.3.0.jar",
                "org.apiguardian/apiguardian-api/1.1.2/**/apiguardian-api-1.1.2.jar",
        ])

dependencies {
    // Keine externe Excel-Bibliothek: XLSX wird mit reinem JDK (java.util.zip + XML) gestreamt.
    if (gradle.startParameter.offline) {
        // Offline: gecachte JARs direkt einbinden.
        testImplementation files(junitCacheJars)
    } else {
        // Online: normale Maven-Koordinaten über mavenCentral.
        testImplementation "org.junit.jupiter:junit-jupiter:${junitVersion}"
        testRuntimeOnly "org.junit.platform:junit-platform-launcher:${junitPlatformVersion}"
    }
}

application {
    mainClass = 'com.xlsbuilder.App'
}

test {
    useJUnitPlatform()
    // Begrenzter Heap, um das Out-of-core-Verhalten der Tests nachzuweisen.
    maxHeapSize = '256m'
    testLogging {
        events 'passed', 'skipped', 'failed'
    }
}

// Eclipse-Integration: Die .settings/-Dateien liegen direkt im Projekt-Repository (versioniert).
// Buildship (Gradle-Integration in Eclipse) liest sie beim Import als "Existing Gradle Project"
// automatisch ein und ergänzt .project/.classpath selbst – ohne Konflikt mit dem eclipse-Plugin.
